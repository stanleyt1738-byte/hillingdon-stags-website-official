<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Match Reports — Hillingdon Stags FC</title>
  <link rel="icon" type="image/png" href="assets/badge.png" />
  <link rel="stylesheet" href="css/style-v2.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <section class="section">
    <div class="container">
      <div class="section-title"><h2>Match Reports</h2></div>
      <p class="muted">Write-ups from match days &mdash; the good, the bad and the muddy.</p>
      <div id="reports" class="mt-1"></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="js/main-v2.js"></script>
<script>
document.addEventListener("stags:ready", async () => {
  const data = await loadJSON("data/reports.json");
  if (data) renderReports(document.getElementById("reports"), data.reports);
});
</script>

</body>
</html>
