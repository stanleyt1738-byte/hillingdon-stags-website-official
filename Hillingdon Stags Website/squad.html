<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meet the Squad — Hillingdon Stags FC</title>
  <link rel="icon" type="image/svg+xml" href="assets/badge.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <section class="section">
    <div class="container">
      <div class="section-title"><h2>Meet the Squad</h2></div>
      <p class="muted">The lads representing the Stags this season.</p>
      <div id="squad"></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="js/main.js"></script>
<script>
document.addEventListener("stags:ready", async () => {
  const data = await loadJSON("data/squad.json");
  if (data) renderSquad(document.getElementById("squad"), data.squad);
});
</script>

</body>
</html>
