<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sponsors — Hillingdon Stags FC</title>
  <link rel="icon" type="image/png" href="assets/badge.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <section class="hero" style="padding: 2.5rem 0 3rem;">
    <div class="container">
      <span class="league-badge">Backing the Stags</span>
      <h1>OUR <span class="accent">SPONSORS</span></h1>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div id="sponsors" class="card-grid"></div>
    </div>
  </section>

  <section class="section" style="background: var(--stag-black); color: var(--stag-white);">
    <div class="container text-center" style="max-width: 640px;">
      <h2 style="color: var(--stag-gold);">Want to sponsor the Stags?</h2>
      <p style="color: var(--stag-grey-300);">
        Get your brand on our shirt, hoardings, socials and match-day setup. We're a proper grassroots club with a loyal following — drop us a line and we'll put a package together.
      </p>
      <a class="btn btn-ghost" href="contact.html">Get in touch</a>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="js/main.js"></script>
<script>
document.addEventListener("stags:ready", async () => {
  const data = await loadJSON("data/sponsors.json");
  if (data) renderSponsors(document.getElementById("sponsors"), data.sponsors);
});
</script>

</body>
</html>
