<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Results — Hillingdon Stags FC</title>
  <link rel="icon" type="image/svg+xml" href="assets/badge.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <section class="section">
    <div class="container">
      <div class="section-title"><h2>Results</h2></div>
      <p class="muted">All results this season — auto-updates from Mitoo.</p>
      <div id="results-list" class="card-grid mt-1"></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="js/main.js"></script>
<script>
document.addEventListener("stags:ready", async () => {
  const data = await loadJSON("data/results.json");
  if (data) renderResultsList(document.getElementById("results-list"), data.results);
});
</script>

</body>
</html>
