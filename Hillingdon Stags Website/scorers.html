<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Top Scorers & MOTM — Hillingdon Stags FC</title>
  <link rel="icon" type="image/png" href="assets/badge.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <section class="section">
    <div class="container">
      <div class="section-title"><h2>Top Scorers</h2></div>
      <p class="muted">Golden Boot race &mdash; 2025/26.</p>
      <div id="scorers" class="mt-1"></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-title"><h2>Man of the Match</h2></div>
      <p class="muted">Most MOTM awards this season.</p>
      <div id="motm" class="mt-1"></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="js/main.js?v=2"></script>
<script>
document.addEventListener("stags:ready", async () => {
  const [data, resultsData] = await Promise.all([
    loadJSON("data/scorers.json"),
    loadJSON("data/results.json")
  ]);
  if (data) {
    renderScorers(document.getElementById("scorers"), data, "scorers", "Goals");

    // Derive MOTM counts from results if scorers.json motm is empty
    let motmSource = data;
    if ((!data.motm || !data.motm.length) && resultsData && resultsData.results) {
      const counts = {};
      for (const r of resultsData.results) {
        if (r.motm) counts[r.motm] = (counts[r.motm] || 0) + 1;
      }
      const motm = Object.entries(counts)
        .map(([name, awards]) => ({ name, awards }))
        .sort((a, b) => b.awards - a.awards);
      motmSource = { ...data, motm };
    }
    renderScorers(document.getElementById("motm"), motmSource, "motm", "Awards");
  }
});
</script>

</body>
</html>
