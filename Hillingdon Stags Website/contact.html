<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Hillingdon Stags FC</title>
  <link rel="icon" type="image/png" href="assets/badge.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <section class="section">
    <div class="container" style="max-width: 720px;">
      <div class="section-title"><h2>Get in Touch</h2></div>
      <p>Want to get in contact with the club? Head to our Instagram and drop us a message &mdash; DMs are open.</p>

      <a href="https://www.instagram.com/hillingdonstags/" target="_blank" rel="noopener"
         class="card mt-1" style="display:flex; align-items:center; gap: 1rem; border-top: 3px solid var(--stag-gold); text-decoration: none;">
        <div style="width:64px; height:64px; border-radius: 50%; background: var(--stag-black); color: var(--stag-gold); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px;">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </div>
        <div>
          <div style="font-family: var(--font-display); font-size: 0.85rem; letter-spacing: 0.18em; color: var(--stag-grey-500); text-transform: uppercase;">Message us on Instagram</div>
          <div style="font-family: var(--font-display); font-size: 1.5rem; color: var(--stag-black); letter-spacing: 0.04em;">@hillingdonstags</div>
          <div class="meta" style="margin-top:0.25rem;">Sponsors, press, or just saying hello &mdash; all welcome.</div>
        </div>
      </a>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="js/main-v2.js"></script>

</body>
</html>
